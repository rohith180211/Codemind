server:
  port: 8082

spring:
  application:
    name: repo-service
  datasource:
    url: jdbc:postgresql://localhost:5432/codemind_repos
    username: codemind
    password: codemind
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info