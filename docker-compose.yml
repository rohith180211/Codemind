version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: codemind-postgres
    environment:
      POSTGRES_USER: codemind
      POSTGRES_PASSWORD: codemind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  postgres-data: